<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRUD de Tareas</title>

<style>
body {
  font-family: Arial;
  background: #f1f1f1;
  text-align: center;
  padding-top: 40px;
  transition: 0.3s;
}

.dark {
  background: #1a1a1a;
  color: white;
}

h1 {
  font-size: 40px;
}

.contenedor {
  background: white;
  width: 400px;
  margin: auto;
  padding: 15px;
  border-radius: 12px;
  display: flex;
  gap: 10px;
  box-shadow: 0 0 10px #ccc;
}

.dark .contenedor {
  background: #333;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #bbb;
}

button {
  padding: 10px 15px;
  border: none;
  background: #28a745;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #218838;
}

ul {
  list-style: none;
  padding: 0;
  margin-top: 20px;
}

li {
  width: 380px;
  margin: auto;
  background: white;
  padding: 10px;
  display: flex;
  gap: 10px;
  align-items: center;
  border-radius: 8px;
  margin-bottom: 10px;
  box-shadow: 0 0 5px #ccc;
}

.dark li {
  background: #333;
}

li span {
  flex: 1;
  text-align: left;
}

.editBtn {
  background: #007bff;
}

.editBtn:hover {
  background: #0069d9;
}

.delBtn {
  background: #dc3545;
}

.delBtn:hover {
  background: #c82333;
}

.tema {
  background: #222;
  border-radius: 50%;
  padding: 10px;
  font-size: 20px;
  position: fixed;
  right: 20px;
  bottom: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Mis Tareas</h1>

<div class="contenedor">
  <input type="text" id="tareaInput" placeholder="Escribe una tarea">
  <button id="agregarBtn">Agregar</button>
</div>

<ul id="lista"></ul>

<button id="temaBtn" class="tema">🌙</button>

<script>
let lista = document.getElementById("lista");
let tareaInput = document.getElementById("tareaInput");
let agregarBtn = document.getElementById("agregarBtn");
let temaBtn = document.getElementById("temaBtn");

let tareas = []; 

function render() {
  lista.innerHTML = "";

  tareas.forEach((t) => {
    let li = document.createElement("li");

    let checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = t.hecha;
    checkbox.onchange = () => completar(t.id, t.hecha);

    let span = document.createElement("span");
    span.textContent = t.texto;
    if (t.hecha) span.style.textDecoration = "line-through";

    let editBtn = document.createElement("button");
    editBtn.className = "editBtn";
    editBtn.textContent = "Editar";
    editBtn.dataset.id = t.id;
    editBtn.dataset.texto = t.texto;
    editBtn.onclick = () => editar(t.id, t.texto);

    let delBtn = document.createElement("button");
    delBtn.className = "delBtn";
    delBtn.textContent = "X";
    delBtn.onclick = () => borrar(t.id);

    li.appendChild(checkbox);
    li.appendChild(span);
    li.appendChild(editBtn);
    li.appendChild(delBtn);

    lista.appendChild(li);
  });
}

temaBtn.onclick = () => {
  document.body.classList.toggle("dark");
  temaBtn.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
};

async function obtenerTareas() {
  let res = await fetch("/tasks", {
    credentials: "include"
  });

  let data = await res.json();

  tareas = data;
  render();
}

obtenerTareas();

agregarBtn.onclick = async () => {
  let txt = tareaInput.value.trim();
  if (txt === "") return;

  await fetch("/tasks", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ texto: txt })
  });

  tareaInput.value = "";
  obtenerTareas();
};

async function completar(id, estadoActual) {
  await fetch(`/tasks/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ hecha: estadoActual ? 0 : 1 })
  });

  obtenerTareas();
}

async function editar(id, textoActual) {
  let nuevo = prompt("Editar tarea:", textoActual);
  if (!nuevo || nuevo.trim() === "") return;

  await fetch(`/tasks/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ texto: nuevo.trim() })
  });

  obtenerTareas();
}

async function borrar(id) {
  await fetch(`/tasks/${id}`, {
    method: "DELETE",
    credentials: "include"
  });

  obtenerTareas();
}
</script>
